name: Deploy PR Preview to Netlify

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/deploy')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.ref);

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Run build
        uses: ./.github/workflows/composites/run-build
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}

      - name: Deploy to Netlify (preview)
        id: netlify
        run: |
          npm install -g netlify-cli
          OUTPUT=$(netlify deploy --dir=dist --json)
          echo "deploy_url=$(echo $OUTPUT | jq -r '.deploy_url')" >> $GITHUB_OUTPUT
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Comment deploy URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Preview deployed: ${{ steps.netlify.outputs.deploy_url }}`,
            });
