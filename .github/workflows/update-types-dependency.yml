name: Update Types Dependency

on:
  repository_dispatch:
    types: [types-released]
  workflow_dispatch:
    inputs:
      ref:
        description: "Package version"
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  package_version: ${{ github.event.client_payload.version || inputs.ref }}

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install dependencies
        uses: ./.github/workflows/composites/install-dependencies
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          registry-url: https://npm.pkg.github.com
          scope: "@watchborne"

      - name: Update @watchborne/charge-points-types
        run: |
          npm install --save "@watchborne/charge-points-types@${{ env.package_version }}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          commit-message: "chore(deps): bump @watchborne/charge-points-types to ${{ env.package_version }}"
          title: "chore(deps): bump @watchborne/charge-points-types to ${{ env.package_version }}"
          body: |
            Automated dependency bump from types package release.

            **Release:** [`${{ env.package_version }}`](https://github.com/watchborne/charge-points-types/releases/tag/${{ env.package_version }})

            **Changes:**
            - Updates `@watchborne/charge-points-types` to `${{ env.package_version }}`

            Please review the [types release notes](https://github.com/watchborne/charge-points-types/releases/tag/${{ env.package_version }}) for any breaking changes.
          branch: chore/bump-types-${{ env.package_version }}
          delete-branch: true
