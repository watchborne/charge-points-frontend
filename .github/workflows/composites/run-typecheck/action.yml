name: "Run typecheck"
description: "Run TS type checker"

runs:
  using: "composite"
  steps:
    - uses: runs-on/action@v2

    - uses: actions/setup-node@v6
      with:
        node-version-file: "package.json"

    - name: Install dependencies
      uses: ./.github/workflows/composites/install-dependencies

    - name: Run typecheck
      run: npm run typecheck
      shell: bash
