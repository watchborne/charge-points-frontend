name: "Install dependencies"
description: "Install and cache dependencies"

runs:
  using: "composite"

  steps:
    - name: Get Node version
      id: node-version
      uses: ./.github/workflows/composites/get-node-version

    - name: Install dependencies
      run: npm ci
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      shell: bash
