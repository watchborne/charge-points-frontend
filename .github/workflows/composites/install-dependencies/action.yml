name: "Install dependencies"
description: "Install and cache dependencies"

inputs:
  npm-token:
    description: "NPM token for private packages"
    required: true

runs:
  using: "composite"

  steps:
    - name: Get Node version
      id: node-version
      uses: ./.github/workflows/composites/get-node-version

    - name: Install dependencies
      run: npm ci
      env:
        NPM_TOKEN: ${{ inputs.npm-token }}
      shell: bash
