name: "Run build"
description: "Build the application"

inputs:
  npm-token:
    description: "NPM token for private packages"
    required: true

runs:
  using: "composite"
  steps:
    - uses: runs-on/action@v2

    - name: Install dependencies
      uses: ./.github/workflows/composites/install-dependencies
      with:
        npm-token: ${{ inputs.npm-token }}

    # Persist Next.js's incremental compiler cache between runs. A fresh entry
    # is written per commit; restore-keys falls back to the most recent cache
    # for the same lockfile, so unchanged modules are not recompiled.
    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: .next/cache
        key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
        restore-keys: |
          nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

    - name: Run build
      run: npm run build
      shell: bash
