name: Generate PR description

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.body == ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Generate and update PR description
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');

            // Limit diff size to stay within model context limits while preserving meaningful content
            const MAX_DIFF_LENGTH = 12000;

            const base = 'origin/${{ github.base_ref }}';
            const commits = execSync(`git log ${base}..HEAD --oneline --no-merges`).toString().trim();
            const diffStat = execSync(`git diff ${base}..HEAD --stat`).toString().trim();
            let diff = execSync(`git diff ${base}..HEAD`).toString();
            if (diff.length > MAX_DIFF_LENGTH) diff = diff.substring(0, MAX_DIFF_LENGTH) + '\n... (truncated)';

            const systemPrompt = `You are an experienced frontend software engineer.

Write a clear and concise Pull Request description based on the provided context and code changes.

Repository context:
- This is the frontend application for an OCPP software.
- The app is built with React and TypeScript via Next.js
- All communication is done via WebSocket, except for REST APIs over HTTP using fetch Browser API
- For charge point management and state, connection, synchronization, and charge point business status must be kept separate.

Rules:
- Be concise but informative, highlighting the main changes.
- Include relevant context or background information that would help reviewers understand the changes and their impact on the codebase.
- Prefer system behavior over file-level description.
- Avoid vague wording.

Output raw markdown only using this exact structure. Omit any section that is not applicable:

## Context

Describe the problem or issue the pull request is addressing.

## Solution

Summarize the main changes and how they address the problem.
If relevant, explain the reasoning behind the solution and any trade-offs considered.

## Testing

Describe the testing strategy if tests were added or modified.

## Breaking changes

Describe breaking changes if any are introduced.`;

            const userMessage = `Commits:\n${commits}\n\nDiff stat:\n${diffStat}\n\nDiff:\n${diff}`;

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  { role: 'system', content: systemPrompt },
                  { role: 'user', content: userMessage },
                ],
                max_tokens: 2048,
                temperature: 0.3,
              }),
            });

            if (!response.ok) {
              const error = await response.text();
              core.setFailed(`GitHub Models API error: ${response.status} - ${error}`);
              return;
            }

            const data = await response.json();
            if (!data.choices || data.choices.length === 0) {
              core.setFailed('GitHub Models API returned no choices');
              return;
            }
            const description = data.choices[0].message.content.trim();

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: description,
            });

            core.info('PR description updated successfully');
