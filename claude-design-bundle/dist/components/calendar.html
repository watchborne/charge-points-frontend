  --muted:210 40% 96.1%;--muted-foreground:215.4 16.3% 46.9%;

/* Watchborne Design System — v0.1 */



:root {
  /* ---- Volt Ink (marque / corporate) ---- */
  --ink-900: #0e1b33;
  --ink-800: #162746;
  --ink-700: #1e3358;
  --ink-600: #2c4978;
  --ink-400: #5b7aae;
  --ink-200: #afc2dd;
  --ink-100: #d8e2f0;
  --ink-50: #f1f5fb;

  /* ---- Charge Amber (accent / charge active) ---- */
  --charge-700: #9a5b0e;
  --charge-600: #c67a14;
  --charge-500: #e2941f;
  --charge-400: #f2a93b;
  --charge-200: #fad79b;
  --charge-100: #fce9c7;
  --charge-50: #fdf4e4;

  /* ---- États borne ---- */
  --st-available-700: #1e6b45;
  --st-available-500: #2e9460;
  --st-available-100: #dcf0e5;

  --st-charging-700: #9a5b0e;
  --st-charging-500: #e2941f;
  --st-charging-100: #fce9c7;

  --st-error-700: #a12d2d;
  --st-error-500: #d34545;
  --st-error-100: #fbe2e2;

  --st-offline-700: #5b5f6a;
  --st-offline-500: #8b909c;
  --st-offline-100: #e7e8eb;

  --st-maint-700: #5b3e96;
  --st-maint-500: #7e5bc4;
  --st-maint-100: #eae2f8;

  /* ---- Neutres UI ---- */
  --bg-page: #f4f6f9;
  --bg-surface: #ffffff;
  --bg-sunken: #ebeff5;

  --text-primary: #101826;
  --text-secondary: #5a6479;
  --text-tertiary: #8d95a6;

  --border-subtle: #e3e7ee;
  --border-default: #d2d8e3;

  /* ---- Typographie ---- */
  --font-display: "Space Grotesk", sans-serif;
  --font-body: "Inter", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;

  /* ---- Radius ---- */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;

  /* ---- Ombres ---- */
  --shadow-card: 0 1px 2px rgba(16, 24, 38, 0.04), 0 1px 8px rgba(16, 24, 38, 0.04);

  /* ---- Espacement (base-4) ---- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-base: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
}

  body{font-family:var(--font-body);background:var(--bg-page);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:-0.01em;}
  .mono{font-family:var(--font-mono);}
  .card-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-tertiary);margin-bottom:6px;font-weight:600;}
</style>
